# =========================
# Whitelist localhost 127.0.0.0/24
SCORE=0;
SRC=127.0.0.0/24;

SCORE=12;
HOST=localhost;

SCORE=12;
HOST=127.0.0.1;

# =========================
# Detect other non-PHP web files (HTML, CSS, JS, images, media)
SCORE=0;
PATH=\.html?$;

SCORE=0;
PATH=\.htm$;

SCORE=0;
PATH=\.css$;
SCORE=0;

PATH=\.js$;
SCORE=0;

PATH=\.png$;
SCORE=0;

PATH=\.jpg$;
SCORE=0;

PATH=\.jpeg$;
SCORE=0;

PATH=\.gif$;
SCORE=0;

PATH=\.svg$;
SCORE=0;

PATH=\.ico$;
SCORE=0;

PATH=\.mp4$;
SCORE=0;

PATH=\.mp3$;
SCORE=0;

PATH=\.avi$;
SCORE=0;

PATH=\.mov$;

SCORE=0;
PATH=\.webm$;

# =========================
# Allow /admin on local networks
SCORE=0;
SRC=192.168.0.0/16;
PATH=^/admin;

SCORE=0;
SRC=172.16.0.0/12;
PATH=^/admin;

SCORE=0;
SRC=10.0.0.0/8;
PATH=^/admin;

# =========================
# Block /admin on public networks
SCORE=20;
PATH=^/admin;

# =========================
# Detect ASP.NET files
SCORE=5;
PATH=\.aspx$;

SCORE=5;
PATH=\.ashx$;

SCORE=5;
PATH=\.asmx$;

# =========================
# Block xmlrpc.php (WordPress)
SCORE=15;
PATH=xmlrpc\.php$;

# =========================
# Block suspicious User-Agent
SCORE=15;
HEADERS=User-Agent:.*sqlmap;

SCORE=12;
HEADERS=User-Agent:.*havij;

SCORE=12;
HEADERS=User-Agent:.*pangolin;

SCORE=12;
HEADERS=User-Agent:.*jsql;

SCORE=10;
HEADERS=User-Agent:.*sqlninja;

SCORE=10;
HEADERS=User-Agent:.*nikto;

SCORE=10;
HEADERS=User-Agent:.*dirbuster;

SCORE=10;
HEADERS=User-Agent:.*gobuster;

SCORE=10;
HEADERS=User-Agent:.*wfuzz;

SCORE=10;
HEADERS=User-Agent:.*ffuf;

SCORE=10;
HEADERS=User-Agent:.*wpscan;

SCORE=10;
HEADERS=User-Agent:.*joomscan;

SCORE=10;
HEADERS=User-Agent:.*acunetix;

SCORE=10;
HEADERS=User-Agent:.*netsparker;

SCORE=10;
HEADERS=User-Agent:.*nessus;

SCORE=10;
HEADERS=User-Agent:.*openvas;

SCORE=10;
HEADERS=User-Agent:.*nmap;

SCORE=10;
HEADERS=User-Agent:.*masscan;

SCORE=15;
HEADERS=User-Agent:.*metasploit;

SCORE=15;
HEADERS=User-Agent:.*meterpreter;

SCORE=12;
HEADERS=User-Agent:.*empire;

SCORE=12;
HEADERS=User-Agent:.*cobaltstrike;

SCORE=12;
HEADERS=User-Agent:.*beacon;

# =========================
# Block suspicious Headers

SCORE=12;
HEADERS=X-Scanner:.*;

SCORE=12;
HEADERS=X-Api-Version:.*\.\./;

SCORE=15;
HEADERS=X-Forwarded-For:.*127\.0\.0\.1;

SCORE=15;
HEADERS=X-Original-URL:.*\.\./;

SCORE=15;
HEADERS=X-Rewrite-URL:.*\.\./;

# =========================
# Block XSS attempts (basic patterns)
SCORE=10;
CONTENT=<script.*>.*</script>;

SCORE=10;
CONTENT=onerror\s*=\s*["'].*["'];

SCORE=10;
CONTENT=onload\s*=\s*["'].*["'];

SCORE=10;
CONTENT=<img.*src=.*javascript:.*>;

# =========================
# Block SQL injection (basic patterns)
SCORE=15;
CONTENT=union.*select;

SCORE=15;
CONTENT=select.*from;

SCORE=15;
CONTENT=insert\s+into;

SCORE=15;
CONTENT=update\s+.*set;

SCORE=15;
CONTENT=delete\s+from;

SCORE=15;
CONTENT=drop\s+table;

SCORE=15;
CONTENT=or\s+1=1;

SCORE=15;
CONTENT=--\s;

# =========================
# Block command injection attempts
SCORE=15;
CONTENT=;.*(ls|cat|id|whoami|pwd|mkdir|rm)\b;

SCORE=15;
CONTENT=`.*(ls|cat|id|whoami|pwd|mkdir|rm)`; 

SCORE=15;
CONTENT=\|.*(ls|cat|id|whoami|pwd|mkdir|rm)\b;

# =========================
# Block common PHP webshell patterns
SCORE=20;
CONTENT=eval\(.+\);

SCORE=20;
CONTENT=base64_decode\(.+\);

SCORE=20;
CONTENT=system\(.+\);

SCORE=20;
CONTENT=exec\(.+\);

SCORE=20;
CONTENT=shell_exec\(.+\);

SCORE=20;
CONTENT=popen\(.+\);

SCORE=20;
CONTENT=passthru\(.+\);

SCORE=20;
CONTENT=proc_open\(.+\);

SCORE=20;
CONTENT=pcntl_exec\(.+\);

SCORE=20;
CONTENT=assert\(.+\);

SCORE=20;
CONTENT=create_function\(.+\);

SCORE=20;
CONTENT=fopen\(.+\);

SCORE=20;
CONTENT=file_get_contents\(.+\);

SCORE=20;
CONTENT=file_put_contents\(.+\);

SCORE=20;
CONTENT=phpinfo\(.+\);
